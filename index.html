<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sBoard</title>
  <style>
    :root {
      --white: #ffffff;
      --black: #000000;
      --gold: #ffd23f;
    }

    #skia-canvas {
      border: 1px solid white;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    canvas {
      border: 1px solid white;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--white);
      color: var(--white);
      font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    h1 {
      font-size: 17px;
      font-weight: 600;
      margin: 0 0 4px;
      letter-spacing: 0.2px;
    }

    p.sub {
      margin: 0 0 20px;
      color: var(--white);
      font-size: 13px;
    }

    .canvases {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    figure {
      margin: 0;
      background: transparent;
      padding: 12px;
    }

    figcaption {
      color: var(--black);
      margin-bottom: 10px;
      text-transform: uppercase;
      text-align: center;
    }

    button {
      padding: 10px 16px;
      border-radius: 6px;
      border: 2px solid var(--black);
      background: transparent;
      color: var(--black);
      cursor: pointer;
      border: 2px solid var(--black);
    }

    button.primary {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--black);
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }
  </style>
</head>

<body>
  <!-- pixi -->
  <div class="canvases">
    <figure>
      <figcaption>PIXI</figcaption>
      <div id="pixi-host"></div>
    </figure>
    <figure>
      <figcaption>SKIA</figcaption>
      <canvas id="skia-canvas" width="560" height="400"></canvas>
    </figure>
  </div>
  <!-- кнопки управляют активным контейнером, его содержимым и экспортом текущего состояния сцены в PDF -->
  <div class="controls" style="margin-top: 30px; text-align: center;">
    <button id="btn-random" style="margin-right: 20px;">Сгенерировать случайную линию/фигуру</button>
    <button id="btn-next-container" style="margin-right: 20px;">Следующий контейнер</button>
    <button id="btn-reset" style="margin-right: 20px;">Сбросить сцену</button>
    <button id="btn-pdf" class="primary" disabled>Экспорт в PDF</button>
  </div>
  <!-- в status выводится текущее pointer-событие или результат последнего действия пользователя -->
  <div id="status" style="margin-top: 16px; min-height: 24px; color: #000;"></div>
  <div id="skia-info" style="margin-top: 6px; font-size: 12px; color: #333; min-height: 16px;"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
